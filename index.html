<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вопрос</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;

        background-image: url("https://cdn.pixabay.com/photo/2026/04/02/15/17/regencygirl123-landscape-10205700_1280.jpg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;

        font-family: Arial, sans-serif;
        color: white;
    }

    #question {
        font-size: 36px;
        margin-bottom: 30px;
        text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
    }

    .buttons {
        display: flex;
        gap: 20px;
        margin-bottom: 20px;
    }

    button {
        border: none;
        padding: 15px 40px;
        font-size: 20px;
        border-radius: 12px;
        cursor: pointer;
        transition: 0.3s;
        font-weight: bold;
    }

    .yes {
        background: #2ecc71;
        color: white;
    }

    .yes:hover {
        transform: scale(1.1);
        box-shadow: 0 0 20px #2ecc71;
    }

    .no {
        background: #e74c3c;
        color: white;
    }

    .no:hover {
        transform: scale(1.1);
        box-shadow: 0 0 20px #e74c3c;
    }

    #result {
        font-size: 42px;
        font-weight: bold;
        text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
    }
</style>
</head>
<body>

<h1 id="question">Пойдешь на вечернюю прогулку?</h1>

<div class="buttons" id="buttons">
    <button class="yes" onclick="yesAnswer()">Да</button>
    <button class="no" onclick="noAnswer()">Нет</button>
</div>

<div id="result"></div>

<script>
function yesAnswer() {
    document.getElementById("question").style.display = "none";
    document.getElementById("buttons").style.display = "none";

    document.getElementById("result").innerHTML = "❤️ ПОГНАЛИ КАБААААН ❤️";
}

function noAnswer() {
    document.getElementById("question").style.display = "none";
    document.getElementById("buttons").style.display = "none";

    document.getElementById("result").innerHTML = "😂 С тебя попиес";
}
</script>

</body>
</html>
